# # Docker Compose — local development stack
# # Services:
# #   1. api          — the FastAPI app (port 8000)
# #   2. celery-worker — async task processor (3 queues)
# #   3. celery-beat   — scheduled task runner
# #   4. postgres      — PostgreSQL 16 + TimescaleDB (port 5432)
# #   5. redis         — Redis 7 (port 6379)
# #   6. minio         — S3-compatible storage (ports 9000/9001)
# #   7. prometheus    — metrics collection (port 9090)
# #   8. grafana       — dashboards (port 3001)


version: "3.9"

services:
  # --- Application ---
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
    command: celery -A app.tasks worker -l info -c 4 -Q default,calls,analytics

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
    command: celery -A app.tasks beat -l info

  # --- Databases ---
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: voiceagent
      POSTGRES_USER: voiceagent
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  # --- Object Storage ---
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata: